name: proxyclaw-mem0

services:
  mem0-server:
    image: ${MEM0_SERVER_IMAGE:-qceank/mem0-server:production}
    container_name: proxyclaw-mem0
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${MEM0_PORT:-20061}:8000"
    volumes:
      - mem0_history_data:/app/history
    command: ["sh", "-c", "sleep 15 && uvicorn main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 120"]
    environment:
      - QDRANT_HOST=proxyclaw-qdrant
      - QDRANT_PORT=${MEM0_QDRANT_PORT:-63330}
      - POSTGRES_HOST=proxyclaw-postgresql
      - POSTGRES_PORT=5432
      - NEO4J_URI=bolt://proxyclaw-neo4j:7687
    networks:
      - proxyclaw-stack-network

volumes:
  mem0_history_data:
    driver: local

networks:
  proxyclaw-stack-network:
    external: true