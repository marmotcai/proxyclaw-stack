version: '3.8'

services:
  # Pi Agent 容器
  pi-agent:
    build:
      context: .
      dockerfile: Dockerfile.pi
    container_name: ${PI_CONTAINER_NAME:-pi-sandbox}
    restart: unless-stopped
    
    # 环境变量从 .env 文件注入
    env_file:
      - ../.env
    
    # 额外的环境变量
    environment:
      - PI_CODING_AGENT_SESSION_DIR=${PI_SESSION_DIR:-/data/sessions}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    
    # 卷挂载
    volumes:
      # 工作目录（只读或读写根据需求）
      - ${HOST_WORKSPACE_DIR:-./workspace}:${PI_WORK_DIR:-/workspace}
      # 会话持久化
      - pi-sessions:${PI_SESSION_DIR:-/data/sessions}
      # 自定义扩展
      - ./extensions:/extensions:ro
      # 自定义技能
      - ./skills:/skills:ro
    
    # 资源限制
    deploy:
      resources:
        limits:
          memory: ${PI_MAX_MEMORY:-512m}
          cpus: '${PI_MAX_CPU:-1.0}'
        reservations:
          memory: 256m
          cpus: '0.5'
    
    # 网络配置
    networks:
      - pi-network
    
    # 安全配置
    security_opt:
      - no-new-privileges:true
    
    # 健康检查
    healthcheck:
      test: ["CMD", "pi", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go 客户端服务（可选，用于提供 HTTP API）
  go-client:
    build:
      context: ../go-client
      dockerfile: Dockerfile
    container_name: pi-go-client
    restart: unless-stopped
    
    env_file:
      - ../.env
    
    environment:
      - PI_AGENT_HOST=pi-agent
      - PI_AGENT_PORT=80
      - SERVER_PORT=${GO_CLIENT_PORT:-8080}
      - GOPROXY=https://goproxy.cn,direct
    
    ports:
      - "${GO_CLIENT_PORT:-8080}:8080"
    
    volumes:
      - ${HOST_WORKSPACE_DIR:-./workspace}:/workspace
    
    networks:
      - pi-network
    
    depends_on:
      pi-agent:
        condition: service_healthy
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis（可选，用于会话缓存和状态管理）
  redis:
    image: redis:7-alpine
    container_name: pi-redis
    restart: unless-stopped
    
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis-data:/data
    
    networks:
      - pi-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pi-sessions:
    driver: local
  redis-data:
    driver: local

networks:
  pi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
