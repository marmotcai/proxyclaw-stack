# 共享 Redis 服务定义
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$${REDIS_PASSWORD:-}" ]; then
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
      else
        redis-server --appendonly yes
      fi
      '
    healthcheck:
      test: >
        sh -c '
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          redis-cli -a "$${REDIS_PASSWORD}" ping
        else
          redis-cli ping
        fi
        '
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data: