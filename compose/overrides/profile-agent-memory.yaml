# agent-memory Profile 对共享 fragments 的网络 / 端口 / 卷覆盖（与 fragments 分文件 include 避免冲突）
services:
  postgresql:
    container_name: proxyclaw-agent-memory-postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - proxyclaw_agent_memory_pg:/var/lib/postgresql/data
    networks:
      - proxyclaw-agent-memory

  qdrant:
    container_name: proxyclaw-agent-memory-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - proxyclaw_agent_memory_qdrant:/qdrant/storage
    networks:
      - proxyclaw-agent-memory

  ollama:
    container_name: proxyclaw-agent-memory-ollama
    ports:
      - "${OLLAMA_PORT:-21434}:11434"
    volumes:
      - proxyclaw_agent_memory_ollama:/models
      - ../../middleware/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    networks:
      - proxyclaw-agent-memory

  mem0:
    container_name: proxyclaw-agent-memory-mem0
    ports:
      - "${MEM0_PORT:-20061}:8000"
    volumes:
      - proxyclaw_agent_memory_mem0:/app/history
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      QDRANT_HOST: qdrant
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgresql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - proxyclaw-agent-memory

volumes:
  proxyclaw_agent_memory_pg:
  proxyclaw_agent_memory_qdrant:
  proxyclaw_agent_memory_ollama:
  proxyclaw_agent_memory_mem0:

networks:
  proxyclaw-agent-memory:
    driver: bridge